<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aila4Cuts Photobooth</title>
    <style>
        :root {
            --mauve: #C77398;
            --creme: #FFFBF5;
            --text-dark: #3A3A3C;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--creme);
            color: var(--text-dark);
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            display: none;
            padding: 40px 20px;
            animation: fadeIn 0.4s ease-out;
        }

        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--mauve);
            margin-bottom: 10px;
        }

        button {
            padding: 14px 28px;
            margin: 10px;
            border: none;
            background: var(--mauve);
            color: white;
            cursor: pointer;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        input {
            padding: 12px 18px;
            width: 280px;
            margin: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .booth-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .video-wrapper {
            position: relative;
            width: 480px;
        }

        video {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 18px;
            transform: scaleX(-1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: 800;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            z-index: 10;
        }

        /* Standard 600x1800 aspect ratio container */
        .strip-preview {
            width: 200px;
            position: relative;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border-radius: 4px;
            overflow: hidden;
            margin: auto;
        }

        #stripCanvas, #finalCanvas { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
        
        /* Overlay remains perfectly aligned */
        .border-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            object-fit: fill;
        }

        .filter-btn {
            background: #eee;
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 8px;
            border: none;
            margin: 4px;
            cursor: pointer;
        }

        .filter-btn.active { background: var(--text-dark); color: white; }

        footer {
            margin-top: 60px;
            font-size: 14px;
            font-weight: 500;
            color: var(--mauve);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="page active" id="mainPage">
        <h1>aila4cuts</h1>
        <p>What's the name of the event?</p>
        <input id="eventName" placeholder="Enter Event Name">
        <br>
        <button onclick="goCustomize()">Next</button>
    </div>

    <div class="page" id="setupPage">
        <h2>Customize Event</h2>
        <p>Upload your 600x1800 border template</p>
        <input type="file" id="borderUpload" accept="image/*">
        <br>
        <button onclick="startEvent()">Start Event</button>
    </div>

    <div class="page" id="boothPage">
        <h2 id="eventTitle"></h2>
        <div class="booth-container">
            <div class="video-wrapper">
                <div id="countdown">3</div>
                <video id="video" autoplay playsinline></video>
                <div style="margin-top:10px;">
                    <button class="filter-btn active" onclick="setFilter('none',this)">Normal</button>
                    <button class="filter-btn" onclick="setFilter('grayscale(1)',this)">B&W</button>
                    <button class="filter-btn" onclick="setFilter('sepia(0.6) contrast(1.1)',this)">Vintage</button>
                    <button class="filter-btn" onclick="setFilter('brightness(1.2) contrast(1.1)',this)">Beauty</button>
                </div>
            </div>
            <div class="strip-preview">
                <canvas id="stripCanvas" width="600" height="1800"></canvas>
                <img id="liveBorder" class="border-img">
            </div>
        </div>
        <br>
        <button id="captureBtn" onclick="startSequence()">Start Capture</button>
        <button onclick="toggleFull()" style="background:#636366">Full Screen</button>
    </div>

    <div class="page" id="customPage">
        <h2>Your Strip is Ready</h2>
        <div class="strip-preview" style="width: 280px;">
            <canvas id="finalCanvas" width="600" height="1800"></canvas>
            <img id="finalBorder" class="border-img">
        </div>
        <br>
        <button onclick="downloadStrip()">Download Photo</button>
        <button onclick="retake()">Retake</button>
        <button onclick="endEvent()" style="background:#cc9999">End Event</button>
    </div>

    <footer>@AILA4CUTS</footer>

    <script>
        let video = document.getElementById("video");
        let photos = [];
        let filter = "none";
        let borderImageObj = null;

        // Visual constants to match the black frames in your template
        const PHOTO_Y_START = 105; 
        const PHOTO_GAP = 22;      
        const PHOTO_WIDTH = 512;   
        const PHOTO_HEIGHT = 384;  
        const PHOTO_X_OFFSET = 44; 

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goCustomize() { showPage("setupPage"); }

        function startEvent() {
            let nameInput = document.getElementById("eventName").value;
            document.getElementById("eventTitle").innerText = nameInput || "Photobooth Event";
            
            let file = document.getElementById("borderUpload").files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    borderImageObj = new Image();
                    borderImageObj.src = e.target.result;
                    borderImageObj.onload = () => {
                        document.getElementById("liveBorder").src = e.target.result;
                        document.getElementById("finalBorder").src = e.target.result;
                        drawLiveStrip();
                    };
                };
                reader.readAsDataURL(file);
            }
            showPage("boothPage");
            startCamera();
            drawLiveStrip();
        }

        async function startCamera() {
            try {
                let s = await navigator.mediaDevices.getUserMedia({video:{width:1280,height:960}});
                video.srcObject = s;
            } catch(e) { alert("Camera access required."); }
        }

        function setFilter(f, b) {
            filter = f; video.style.filter = f;
            document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
            b.classList.add("active");
        }

        async function startSequence() {
            photos = [];
            document.getElementById("captureBtn").disabled = true;
            for(let i=0; i<4; i++) {
                await runCountdown();
                capturePhoto();
            }
            setTimeout(() => {
                buildFinalStrip();
                showPage("customPage");
                document.getElementById("captureBtn").disabled = false;
            }, 500);
        }

        function runCountdown() {
            return new Promise(res => {
                let count = 3;
                let el = document.getElementById("countdown");
                el.innerText = count; el.style.display = "block";
                let t = setInterval(() => {
                    count--;
                    if(count <= 0) { clearInterval(t); el.style.display="none"; res(); }
                    else el.innerText = count;
                }, 1000);
            });
        }

        function capturePhoto() {
            let canvas = document.createElement("canvas");
            canvas.width = PHOTO_WIDTH;
            canvas.height = PHOTO_HEIGHT;
            let ctx = canvas.getContext("2d");
            ctx.translate(PHOTO_WIDTH, 0);
            ctx.scale(-1, 1);
            ctx.filter = filter;
            ctx.drawImage(video, 0, 0, PHOTO_WIDTH, PHOTO_HEIGHT);
            photos.push(canvas);
            drawLiveStrip();
        }

        function drawLiveStrip() { renderToCanvas("stripCanvas"); }
        function buildFinalStrip() { renderToCanvas("finalCanvas"); }

        function renderToCanvas(canvasId) {
            let canvas = document.getElementById(canvasId);
            let ctx = canvas.getContext("2d");
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, 600, 1800);
            
            for(let i=0; i<photos.length; i++) {
                let yPos = PHOTO_Y_START + (i * (PHOTO_HEIGHT + PHOTO_GAP));
                ctx.drawImage(photos[i], PHOTO_X_OFFSET, yPos, PHOTO_WIDTH, PHOTO_HEIGHT);
            }
            
            // Only draw the border on the actual canvas if we are building the final downloadable image
            if(borderImageObj && canvasId === "finalCanvas") {
                ctx.drawImage(borderImageObj, 0, 0, 600, 1800);
            }
        }

        function downloadStrip() {
            let name = document.getElementById("eventName").value || "aila4cuts";
            let link = document.createElement("a");
            link.download = `${name.replace(/\s+/g, '-')}-strip.png`;
            link.href = document.getElementById("finalCanvas").toDataURL("image/png");
            link.click();
        }

        function retake() { photos = []; drawLiveStrip(); showPage("boothPage"); }

        function endEvent() {
            photos = []; 
            borderImageObj = null;
            document.getElementById("eventName").value = "";
            document.getElementById("borderUpload").value = "";
            document.getElementById("liveBorder").src = "";
            document.getElementById("finalBorder").src = "";
            showPage("mainPage");
        }

        function toggleFull() {
            if(!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
